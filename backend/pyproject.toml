[tool.ruff]
# Какие правила проверять. "E" и "F" — основные ошибки, "I" — сортировка импортов.
select = ["E", "F", "I", "W"]
ignore = []

# Какие папки игнорировать
exclude = [
    ".venv",
    "migrations",
    "__pycache__",
]

# Автоматически исправлять ошибки, которые можно исправить
fixable = ["ALL"]

[tool.ruff.format]
# Использовать кавычки как в Black (по умолчанию двойные)
quote-style = "double"